<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>登録完了 | FANTIC HOTELS</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: "Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif; background: #f5f5f5; color: #333; }
  .header { background: #1a3a5c; color: #fff; padding: 12px 20px; }
  .header-logo { font-size: 18px; font-weight: bold; letter-spacing: 1px; }
  .header-logo span { font-size: 11px; display: block; opacity: 0.8; font-weight: normal; }
  .container { max-width: 480px; margin: 60px auto; padding: 0 20px; text-align: center; }
  .card { background: #fff; border-radius: 12px; padding: 40px 32px; box-shadow: 0 2px 12px rgba(0,0,0,.08); }
  .icon { font-size: 52px; margin-bottom: 16px; }
  h2 { font-size: 20px; color: #1a3a5c; margin-bottom: 12px; }
  .detail { background: #f0f5ff; border-radius: 8px; padding: 14px 16px; font-size: 13px; line-height: 1.8; margin: 16px 0 24px; text-align: left; }
  .msg { font-size: 13px; color: #555; line-height: 1.7; margin-bottom: 24px; }
  .btn-back { display: inline-block; background: #1a3a5c; color: #fff; text-decoration: none; padding: 12px 32px; border-radius: 6px; font-size: 14px; font-weight: bold; }
  .btn-back:hover { background: #2a5a8c; }
  .error-card h2 { color: #c53030; }
  .error-card .icon { color: #c53030; }
</style>
</head>
<body>

<div class="header">
  <div class="header-logo">
    FANTIC HOTELS
    <span>公式予約 パイロット版</span>
  </div>
</div>

<div class="container">
  <div class="card" id="card">
    <!-- JSで内容を生成 -->
  </div>
</div>

<script>
const p = new URLSearchParams(location.search);
const status = p.get("status");
const type   = p.get("type");
const hotel  = p.get("hotel");
const date   = p.get("date");
const name   = p.get("name");

const card = document.getElementById("card");

if (status === "ok") {
  const isCancel  = type === "cancel";
  const typeLabel = isCancel ? "キャンセル待ち" : "空室待ち";
  const nextMsg   = isCancel
    ? "キャンセルが発生した際に、LINEでお知らせします。"
    : "空室が発生した際に、LINEでお知らせします。";

  card.innerHTML = `
    <div class="icon">✅</div>
    <h2>${typeLabel}の登録が完了しました</h2>
    <div class="detail">
      🏨 ${hotel || "—"}<br>
      📅 ${date || "—"}（チェックイン）<br>
      👤 ${name || "—"} 様
    </div>
    <p class="msg">${nextMsg}</p>
    <a class="btn-back" href="/">トップに戻る</a>
  `;
} else if (status === "cancel") {
  card.innerHTML = `
    <div class="icon">😕</div>
    <h2>登録をキャンセルしました</h2>
    <p class="msg" style="margin-top:12px">LINEログインがキャンセルされました。<br>もう一度お試しください。</p>
    <br>
    <a class="btn-back" href="/">トップに戻る</a>
  `;
} else {
  card.classList.add("error-card");
  card.innerHTML = `
    <div class="icon">⚠️</div>
    <h2>登録に失敗しました</h2>
    <p class="msg" style="margin-top:12px">エラーが発生しました。<br>お手数ですが、もう一度お試しください。</p>
    <br>
    <a class="btn-back" href="/">トップに戻る</a>
  `;
}
</script>
</body>
</html>
