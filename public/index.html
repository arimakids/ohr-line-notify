<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>全施設の空室検索 | FANTIC HOTELS</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif; font-size: 14px; color: #333; background: #f5f5f5; }

  /* Header */
  .header { background: #1a3a5c; color: #fff; padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; }
  .header-logo { font-size: 18px; font-weight: bold; letter-spacing: 1px; }
  .header-logo span { font-size: 11px; display: block; opacity: 0.8; font-weight: normal; }
  .header-nav { display: flex; gap: 16px; font-size: 12px; }
  .header-nav a { color: #cde; text-decoration: none; }
  .header-nav a:hover { color: #fff; }

  /* Search bar */
  .search-bar { background: #fff; border-bottom: 2px solid #1a3a5c; padding: 12px 20px; display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  .search-bar label { font-size: 11px; color: #666; display: block; }
  .search-bar select, .search-bar input[type=date] { padding: 6px 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 13px; }
  .search-btn { background: #1a3a5c; color: #fff; border: none; padding: 8px 20px; border-radius: 4px; cursor: pointer; font-size: 13px; font-weight: bold; }
  .search-btn:hover { background: #2a5a8c; }

  /* Main */
  .main { max-width: 1100px; margin: 20px auto; padding: 0 16px; }
  .page-title { font-size: 20px; font-weight: bold; color: #1a3a5c; margin-bottom: 16px; }

  /* Calendar nav */
  .cal-nav { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
  .cal-nav button { background: #fff; border: 1px solid #ccc; padding: 4px 12px; border-radius: 4px; cursor: pointer; font-size: 13px; }
  .cal-nav button:hover { background: #f0f0f0; }
  .cal-nav .period { font-size: 15px; font-weight: bold; color: #1a3a5c; }

  /* Table */
  .cal-table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,.1); }
  .cal-table { table-layout: fixed; }
  .cal-table th { background: #1a3a5c; color: #fff; padding: 10px 6px; text-align: center; font-size: 12px; font-weight: normal; border-right: 1px solid rgba(255,255,255,.2); width: 90px; }
  .cal-table th.hotel-col { text-align: left; padding-left: 12px; width: 200px; }
  .cal-table td { overflow: hidden; }
  .cal-table th.sat { background: #2255a0; }
  .cal-table th.sun { background: #8b2222; }
  .cal-table td { border: 1px solid #e8e8e8; text-align: center; padding: 8px 4px; vertical-align: middle; }
  .cal-table td.hotel-info { text-align: left; padding: 10px 12px; }
  .cal-table tr:nth-child(even) { background: #fafafa; }

  /* Hotel info cell */
  .hotel-area { font-size: 10px; color: #888; }
  .hotel-brand { font-size: 10px; color: #1a3a5c; font-weight: bold; background: #e8f0fa; display: inline-block; padding: 1px 6px; border-radius: 10px; margin: 2px 0; }
  .hotel-name { font-size: 13px; font-weight: bold; color: #1a3a5c; }

  /* Availability cells */
  .avail-link { display: inline-block; background: #e8f5e9; color: #2e7d32; border: 1px solid #a5d6a7; padding: 4px 8px; border-radius: 4px; text-decoration: none; font-size: 12px; font-weight: bold; }
  .avail-link:hover { background: #c8e6c9; }

  /* Sold out cell */
  .soldout-cell { position: relative; }
  .sold-mark { color: #999; font-size: 18px; line-height: 1; }

  /* LINE waitlist button */
  .line-waitlist-btn {
    display: flex; align-items: center; gap: 4px;
    background: #06C755; color: #fff; border: none; padding: 5px 8px;
    border-radius: 4px; cursor: pointer; font-size: 11px; font-weight: bold;
    margin-top: 4px; width: 100%; justify-content: center;
    text-decoration: none; transition: background .2s;
  }
  .line-waitlist-btn:hover { background: #05a848; }
  .line-waitlist-btn svg { flex-shrink: 0; }

  /* Area row */
  .area-row td { background: #eef3f8; font-size: 12px; font-weight: bold; color: #1a3a5c; padding: 6px 12px; text-align: left; }

  /* Modal overlay */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 1000; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: #fff; border-radius: 12px; padding: 28px 24px; max-width: 380px; width: 90%; }
  .modal-line-logo { font-size: 36px; margin-bottom: 8px; text-align: center; }
  .modal h3 { font-size: 17px; font-weight: bold; color: #1a3a5c; margin-bottom: 8px; text-align: center; }
  .modal .hotel-detail { font-size: 13px; color: #555; margin-bottom: 20px; background: #f5f5f5; padding: 10px; border-radius: 6px; text-align: center; }

  /* Modal form */
  .modal-form-group { margin-bottom: 14px; }
  .modal-form-group label { display: block; font-size: 11px; color: #666; font-weight: 600; margin-bottom: 5px; }
  .modal-form-group input { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; outline: none; }
  .modal-form-group input:focus { border-color: #06C755; }
  .modal-submit-btn { display: flex; align-items: center; justify-content: center; gap: 6px; width: 100%; background: #06C755; color: #fff; border: none; border-radius: 8px; padding: 12px; font-size: 15px; font-weight: bold; cursor: pointer; margin-bottom: 10px; transition: background .2s; }
  .modal-submit-btn:hover { background: #05a848; }
  .modal-submit-btn:disabled { background: #aaa; cursor: not-allowed; }
  .modal .cancel-btn { width: 100%; background: none; border: 1px solid #ccc; border-radius: 6px; padding: 8px 20px; cursor: pointer; font-size: 13px; color: #666; }
  .modal .cancel-btn:hover { background: #f5f5f5; }

  /* Modal success */
  .modal-success { display: none; text-align: center; padding: 16px 0; }
  .modal-success .icon { font-size: 48px; margin-bottom: 12px; }
  .modal-success p { font-size: 14px; color: #555; line-height: 1.7; margin-bottom: 16px; }

  /* Toast */
  .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #333; color: #fff; padding: 10px 20px; border-radius: 20px; font-size: 13px; opacity: 0; transition: opacity .3s; z-index: 2000; white-space: nowrap; }
  .toast.show { opacity: 1; }

  /* Loading */
  .loading-cell { color: #aaa; font-size: 12px; }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="header-logo">
    FANTIC HOTELS
    <span>公式予約 パイロット版</span>
  </div>
  <div class="header-nav">
    <a href="#">施設一覧</a>
    <a href="#">全施設の空室検索</a>
    <a href="admin.html">管理画面</a>
  </div>
</div>

<!-- Search bar -->
<div class="search-bar">
  <div>
    <label>チェックイン日</label>
    <input type="date" id="checkinInput">
  </div>
  <button class="search-btn" onclick="onSearch()">空室を検索</button>
</div>

<!-- Main content -->
<div class="main">
  <div class="page-title">全施設の空室検索</div>

  <div class="cal-nav">
    <button onclick="shiftDays(-7)">◀ 前へ</button>
    <span class="period" id="periodLabel"></span>
    <button onclick="shiftDays(7)">次へ ▶</button>
  </div>

  <table class="cal-table">
    <thead id="tableHead"></thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-line-logo">💚</div>
    <h3 id="modalTitle">空室待ちに登録する</h3>
    <div class="hotel-detail" id="modalDetail"></div>

    <!-- LINEログインボタン -->
    <div id="modalFormArea">
      <p style="font-size:13px;color:#555;margin-bottom:16px;line-height:1.6;">
        LINEアカウントで登録します。<br>空室・キャンセルが発生した際に<br>LINEでお知らせします。
      </p>
      <button class="modal-submit-btn" id="modalSubmitBtn" onclick="goLineLogin()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M12 2C6.48 2 2 5.92 2 10.8c0 2.94 1.6 5.55 4.1 7.24-.18.65-.65 2.35-.74 2.72-.12.44.16.44.34.32.14-.09 2.23-1.5 3.13-2.12.38.05.77.08 1.17.08 5.52 0 10-3.92 10-8.8S17.52 2 12 2z"/></svg>
        <span id="modalSubmitText">LINEでログインして登録</span>
      </button>
      <button class="cancel-btn" onclick="closeModal()">キャンセル</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
const DAYS_JA = ["日","月","火","水","木","金","土"];

// ホテルデータ
const hotels = [
  { area:"関東エリア",   brand:"FANTIC", id:"OHR001", name:"FANTIC HOTEL 熱海" },
  { area:"関東エリア",   brand:"FANTIC", id:"OHR002", name:"FANTIC HOTEL 箱根" },
  { area:"北海道エリア", brand:"FANTIC", id:"OHR003", name:"FANTIC HOTEL 札幌" },
  { area:"沖縄エリア",   brand:"FANTIC", id:"OHR004", name:"FANTIC HOTEL 沖縄" },
];

// 6ヶ月後の日付（受付前ライン）
const today = new Date(); today.setHours(0,0,0,0);
const preOpenDate = new Date(today.getFullYear(), today.getMonth() + 6, today.getDate());

let currentStartDate = new Date();
currentStartDate.setHours(0,0,0,0);

// APIから取得した在庫データ: { "OHR001_2026-07-18": 合計空室数 }
// 値が -1 = 受付前（サーバー側のマーク）
let roomStock = {};

function addDays(date, n) {
  const d = new Date(date); d.setDate(d.getDate() + n); return d;
}
function toISODate(date) {
  return `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`;
}
function formatLabel(date) {
  return `${String(date.getMonth()+1).padStart(2,'0')}/${String(date.getDate()).padStart(2,'0')}(${DAYS_JA[date.getDay()]})`;
}
function buildDates(startDate) {
  return Array.from({length:7}, (_, i) => addDays(startDate, i));
}
function isPreOpen(date) {
  return date >= preOpenDate;
}

// APIから在庫取得（表示中の7日分）
async function fetchRooms(dates) {
  try {
    const from = toISODate(dates[0]);
    const to   = toISODate(dates[6]);
    // ✅ 修正: date_from / date_to
    const res  = await fetch(`/api/rooms?date_from=${from}&date_to=${to}`);
    const rows = await res.json();
    roomStock = {};
    rows.forEach(r => {
      const key = `${r.hotel_id}_${r.check_in_date}`;
      // ✅ 修正: available_rooms → available
      if (roomStock[key] === undefined) {
        roomStock[key] = r.available;
      } else if (r.available === -1) {
        roomStock[key] = -1; // 受付前
      } else {
        roomStock[key] += r.available;
      }
    });
  } catch(e) {
    console.warn("API取得エラー", e);
  }
}

function buildHead(dates) {
  let html = `<tr><th class="hotel-col">施設名</th>`;
  dates.forEach(d => {
    const cls = d.getDay() === 6 ? ' class="sat"' : d.getDay() === 0 ? ' class="sun"' : '';
    html += `<th${cls}>${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}<br><small>${DAYS_JA[d.getDay()]}</small></th>`;
  });
  html += `</tr>`;
  document.getElementById("tableHead").innerHTML = html;
}

function buildBody(dates) {
  const tbody = document.getElementById("tableBody");
  tbody.innerHTML = "";
  let lastArea = "";
  const lineIcon = `<svg width="14" height="14" viewBox="0 0 24 24" fill="white"><path d="M12 2C6.48 2 2 5.92 2 10.8c0 2.94 1.6 5.55 4.1 7.24-.18.65-.65 2.35-.74 2.72-.12.44.16.44.34.32.14-.09 2.23-1.5 3.13-2.12.38.05.77.08 1.17.08 5.52 0 10-3.92 10-8.8S17.52 2 12 2z"/></svg>`;

  hotels.forEach(hotel => {
    if (hotel.area !== lastArea) {
      tbody.innerHTML += `<tr class="area-row"><td colspan="8">${hotel.area}</td></tr>`;
      lastArea = hotel.area;
    }
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td class="hotel-info">
        <div class="hotel-area">${hotel.area}</div>
        <div><span class="hotel-brand">${hotel.brand}</span></div>
        <div class="hotel-name">${hotel.name}</div>
      </td>`;

    dates.forEach(date => {
      const td = document.createElement("td");
      const dateStr = toISODate(date);
      const label = formatLabel(date);
      const key = `${hotel.id}_${dateStr}`;
      const avail = roomStock[key];

      if (isPreOpen(date) || avail === -1) {
        // 6ヶ月以降 → 受付前
        td.className = "soldout-cell";
        td.innerHTML = `
          <div class="sold-mark" style="color:#bbb;font-size:11px">受付前</div>
          <button class="line-waitlist-btn" onclick="openModal('${hotel.id}','${hotel.name}','${label}','${dateStr}','preopen')">
            ${lineIcon}空室待ち
          </button>`;
      } else if (avail === undefined) {
        // APIデータなし
        td.innerHTML = `<span style="color:#ccc">—</span>`;
      } else if (avail > 0) {
        // 空室あり
        td.innerHTML = `<a class="avail-link" href="#">残り${avail}室</a>`;
      } else {
        // 満室 → キャンセル待ち
        td.className = "soldout-cell";
        td.innerHTML = `
          <div class="sold-mark">✕</div>
          <button class="line-waitlist-btn" onclick="openModal('${hotel.id}','${hotel.name}','${label}','${dateStr}','cancel')">
            ${lineIcon}キャンセル待ち
          </button>`;
      }
      tr.appendChild(td);
    });

    tbody.appendChild(tr);
  });
}

function updatePeriodLabel(dates) {
  document.getElementById("periodLabel").textContent =
    `${dates[0].getFullYear()} ${formatLabel(dates[0])} 〜 ${formatLabel(dates[6])}`;
}

async function render() {
  const dates = buildDates(currentStartDate);
  buildHead(dates);
  // ローディング表示
  document.getElementById("tableBody").innerHTML =
    `<tr><td colspan="8" class="loading-cell" style="padding:20px;text-align:center">読み込み中...</td></tr>`;
  updatePeriodLabel(dates);
  document.getElementById("checkinInput").value = toISODate(currentStartDate);
  await fetchRooms(dates);
  buildBody(dates);
}

function onSearch() {
  const val = document.getElementById("checkinInput").value;
  if (val) { currentStartDate = new Date(val + "T00:00:00"); render(); }
}
function shiftDays(n) {
  currentStartDate = addDays(currentStartDate, n);
  render();
}
document.getElementById("checkinInput").addEventListener("keydown", e => {
  if (e.key === "Enter") onSearch();
});

// ===== モーダル =====
let modalHotelId = "", modalHotelName = "", modalDateStr = "", modalType = "cancel";

function openModal(hotelId, hotelName, label, dateStr, type) {
  modalHotelId   = hotelId;
  modalHotelName = hotelName;
  modalDateStr   = dateStr;
  modalType      = type;

  const titles = {
    preopen: "空室待ちに登録する",
    cancel:  "キャンセル待ちに登録する",
    vacancy: "空室待ちに登録する",
  };
  const btnLabels = {
    preopen: "LINEでログインして登録",
    cancel:  "LINEでログインして登録",
    vacancy: "LINEでログインして登録",
  };
  document.getElementById("modalTitle").textContent = titles[type] || "空室待ちに登録する";
  document.getElementById("modalDetail").innerHTML =
    `<strong>${hotelName}</strong><br>チェックイン: ${label}`;
  document.getElementById("modalSubmitText").textContent = btnLabels[type];
  document.getElementById("modalFormArea").style.display = "block";
  document.getElementById("modalSubmitBtn").disabled = false;
  document.getElementById("modalOverlay").classList.add("open");
}

function closeModal() {
  document.getElementById("modalOverlay").classList.remove("open");
}
document.getElementById("modalOverlay").addEventListener("click", function(e) {
  if (e.target === this) closeModal();
});

// LINE Loginページへリダイレクト
function goLineLogin() {
  const params = new URLSearchParams({
    type:      modalType,
    hotelId:   modalHotelId,
    hotelName: modalHotelName,
    date:      modalDateStr,
  });
  location.href = `/auth/line?${params}`;
}

function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 3000);
}

// 初期描画
render();
</script>
</body>
</html>
